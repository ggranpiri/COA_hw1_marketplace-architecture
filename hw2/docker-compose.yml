version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d marketplace"]
      interval: 2s
      timeout: 2s
      retries: 30

  flyway:
    image: flyway/flyway:10
    depends_on:
      db:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://db:5432/marketplace
      -user=app
      -password=app
      -connectRetries=60
      migrate
    volumes:
      - ./migrations:/flyway/sql:ro

  api:
    build: .
    environment:
      PYTHONPATH: "/app/generated/src:/app"
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/marketplace
      JWT_SECRET: "dev-secret-change-me"
      ACCESS_TOKEN_MINUTES: "20"
      REFRESH_TOKEN_DAYS: "14"
      ORDER_RATE_LIMIT_MINUTES: "2"
    ports:
      - "8000:8000"
    depends_on:
      flyway:
        condition: service_completed_successfully